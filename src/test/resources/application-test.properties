# Test Configuration for Elicit Admin Service

# Datasource Configuration for Tests
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=test
quarkus.datasource.password=test
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/test

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Flyway disabled for tests (using drop-and-create instead)
quarkus.flyway.migrate-at-start=false

# OIDC Test Configuration
quarkus.oidc.enabled=false
quarkus.oidc.tenant-enabled=false

# Disable mailer for tests
quarkus.mailer.mock=true

# Disable scheduler for tests
quarkus.scheduler.enabled=false

# Test logging
quarkus.log.level=INFO
quarkus.log.category."com.elicitsoftware".level=DEBUG
